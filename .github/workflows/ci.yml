name: Build Frontend and Backend Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          # Build backend dependencies
          FROM node:20-alpine AS backend
          WORKDIR /app/backend
          COPY backend/package*.json ./
          RUN npm install
          COPY backend ./

          # Final image image 
          FROM nginx:alpine
          RUN apk add --no-cache nodejs npm
          COPY frontend/public /usr/share/nginx/html
          COPY --from=backend /app/backend /app/backend
          COPY nginx.conf /etc/nginx/nginx.conf
          EXPOSE 8080
          CMD ["sh", "-c", "node /app/backend/server.js & nginx -g 'daemon off;'"]
          EOF

      - name: Create nginx.conf
        run: |
          cat > nginx.conf <<'EOF'
          events {}

          http {
            server {
              listen 8080;

              location / {
                root /usr/share/nginx/html;
                index index.html;
                try_files $uri /index.html;
              }

              location /api {
                proxy_pass http://localhost:5000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
              }
            }
          }
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME_DOCKERHUB }}
          password: ${{ secrets.PASSWORD_ORTOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.USERNAME_DOCKERHUB }}/fullstack-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.USERNAME_DOCKERHUB }}/fullstack-app:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_IP }} << EOF
          docker pull ${{ secrets.USERNAME_DOCKERHUB }}/fullstack-app:latest
          docker stop myapp || true
          docker rm myapp || true
          docker run -d \ 
            --name myapp \
            -p 8080:8080 \
            --restart unless-stopped \
            ${{ secrets.USERNAME_DOCKERHUB }}/fullstack-app:latest
          sleep 5
          echo "Container logs"
          docker logs myapp
          EOF

