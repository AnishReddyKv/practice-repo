name: Build Frontend and Backend Images
on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          FROM node:20-alpine AS frontend
          WORKDIR /app/frontend
          COPY frontend/package*.json ./
          RUN npm install
          COPY frontend ./

          FROM node:20-alpine AS backend
          WORKDIR /app/backend
          COPY backend/package*.json ./
          RUN npm install
          COPY backend ./

          FROM node:20-alpine
          WORKDIR /app
          COPY --from=frontend /app/frontend ./frontend
          COPY --from=backend /app/backend ./backend
          EXPOSE 3000
          EXPOSE 5000
          CMD sh -c "node backend/server.js & node frontend/server.js"
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME_DOCKERHUB }}
          password: ${{ secrets.PASSWORD_ORTOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.SSH_IP }} >> ~/.ssh/known_hosts  # ✅ use IP, not username

      - name: Deploy to Server
        run: |
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_IP }} << EOF  # ✅ user@host, unquoted EOF
            docker pull ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest
            docker stop myapp || true
            docker rm myapp || true
            docker run -d \
              --name myapp \
              -p 80:3000 \
              -p 5000:5000 \
              --restart unless-stopped \
              ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest
          EOF
