
name: Build Frontend and Backend Images

on:
  push:
    branches: main
  workflow_dispatch: 

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create frontend Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          FROM node:20-alpine AS frontend
          WORKDIR /app/frontend
          COPY frontend/package*.json ./
          RUN npm install
          COPY frontend ./

          FROM node:20-alpine AS backend
          WORKDIR /app/backend
          COPY backend/package*.json ./
          RUN npm install
          COPY backend ./

          FROM node:20-alpine
          WORKDIR /app
          COPY --from=frontend /app/frontend ./frontend
          COPY --from=backend /app/backend ./backend
          EXPOSE 3000
          EXPOSE 5000
          CMD sh -c "node backend/server.js & node frontend/server.js"
          EOF

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to dockerhub
        uses: docker/login-action@v3
        with:
           username: ${{ secrets.USERNAME_DOCKERHUB }}
           password: ${{ secrets.PASSWORD_ORTOKEN }}

      - name: Build frontend image
        run: docker build -t ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest ./frontend

      - name: Push frontend image
        run: |
             docker push ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest

      - name: Build backend image
        run: docker build -t ${{ secrets.USERNAME_DOCKERHUB }}/backend-app:latest ./backend

      - name: Push backend image
        run: |
            docker push ${{ secrets.USERNAME_DOCKERHUB }}/backend-app:latest
