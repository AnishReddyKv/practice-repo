name: Build Frontend and Backend Images
on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          FROM node:20-alpine AS frontend
          WORKDIR /app/frontend
          COPY frontend/package*.json ./
          RUN npm install
          COPY frontend ./

          FROM node:20-alpine AS backend
          WORKDIR /app/backend
          COPY backend/package*.json ./
          RUN npm install
          COPY backend ./

          FROM nginx:alpine
          WORKDIR /app
          COPY --from=frontend /app/frontend/build /usr/share/nginx/html
          COPY --from=backend /app/backend ./backend
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 8080
          CMD sh -c "node backend/server.js & nginx -g 'daemon off;'"
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME_DOCKERHUB }}
          password: ${{ secrets.PASSWORD_ORTOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Write key and ensure trailing newline
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_IP }} << EOF
          docker pull ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest
          docker stop myapp || true
          docker rm myapp || true
          docker run -d \
            --name myapp \
            -p 8080:3000 \
            --restart unless-stopped \
            ${{ secrets.USERNAME_DOCKERHUB }}/frontend-app:latest
          EOF
